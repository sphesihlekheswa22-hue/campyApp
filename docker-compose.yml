services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: jse_user
      POSTGRES_PASSWORD: jse_password
      POSTGRES_DB: jse_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jse_user -d jse_analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://jse_user:jse_password@db:5432/jse_analytics
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      SMTP_HOST: mailhog
      SMTP_PORT: 1025
      APP_ENV: development
    volumes:
      - ./backend/uploads:/app/uploads
      - ./frontend:/app/frontend
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

volumes:
  postgres_data:
