# Render Blueprint — JSE Analytics Platform

services:
  - type: web
    name: jse-analytics
    runtime: python
    region: frankfurt
    plan: free
    rootDir: backend
    buildCommand: bash scripts/render-build.sh
    startCommand: bash scripts/start.sh
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: APP_URL
        sync: false
      - key: PLATFORM_OWNER_EMAIL
        value: admin@bluemachines.com
      - key: PLATFORM_OWNER_PASSWORD
        sync: false
      - key: STORAGE_BACKEND
        value: s3
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT_URL
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_REGION
        value: auto
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASSWORD
        value: ""
      - key: SMTP_FROM
        value: noreply@jse-analytics.com
      - key: BREVO_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ALERT_EMAIL
        sync: false
