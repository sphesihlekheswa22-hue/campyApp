<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JSE Analytics Platform{% endblock %}</title>

  <link rel="stylesheet" href="/css/tailwind.css">
  <link rel="stylesheet" href="/css/perf.css">

  <!-- Preconnect for performance -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>

  <!-- Custom Premium Auth Styles -->
  <style>
    :root {
      --radius-sm: 10px;
      --radius-md: 14px;
      --radius-lg: 18px;
      --radius-xl: 24px;
      --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.12);
      --shadow-glow-strong: 0 0 60px rgba(59, 130, 246, 0.2);
      --shadow-card: 0 8px 32px rgba(0, 0, 0, 0.3);
      --shadow-elevated: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #020617;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Static mesh background */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(37, 99, 235, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.08) 0%, transparent 50%),
        linear-gradient(180deg, #020617 0%, #0f172a 50%, #020617 100%);
    }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }

    .orb-1 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(37, 99, 235, 0.15), transparent 70%);
      top: -10%;
      left: -10%;
    }

    .orb-2 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.1), transparent 70%);
      bottom: -5%;
      right: -5%;
    }

    .orb-3 {
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.08), transparent 70%);
      top: 40%;
      left: 60%;
    }

    /* Grid pattern overlay */
    .grid-pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: 
        linear-gradient(rgba(148, 163, 184, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(148, 163, 184, 0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
      -webkit-mask-image: radial-gradient(ellipse at center, black 40%, transparent 80%);
    }

    /* Noise texture */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Auth card glassmorphism */
    .auth-card {
      position: relative;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: var(--radius-xl);
      box-shadow: 
        var(--shadow-card),
        0 0 0 1px rgba(255, 255, 255, 0.03) inset;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
    }

    .auth-card:hover {
      border-color: rgba(59, 130, 246, 0.2);
      box-shadow: 
        var(--shadow-elevated),
        var(--shadow-glow),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
    }

    /* Card inner glow on top edge */
    .auth-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 10%;
      right: 10%;
      height: 100px;
      background: radial-gradient(ellipse at center top, rgba(59, 130, 246, 0.08), transparent 70%);
      pointer-events: none;
    }

    /* Logo container */
    .logo-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      box-shadow: 
        0 8px 24px rgba(37, 99, 235, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 0 40px rgba(37, 99, 235, 0.15);
      transition: all 0.3s ease;
    }

    .logo-container:hover {
      transform: translateY(-2px) scale(1.05);
      box-shadow: 
        0 12px 32px rgba(37, 99, 235, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.15) inset,
        0 0 60px rgba(37, 99, 235, 0.2);
    }

    .logo-container::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: calc(var(--radius-lg) + 4px);
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), transparent 60%);
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .logo-container:hover::before {
      opacity: 1;
    }

    /* Premium input fields */
    .input-premium {
      width: 100%;
      padding: 14px 16px 14px 44px;
      background: rgba(30, 41, 59, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.12);
      border-radius: var(--radius-md);
      color: #e2e8f0;
      font-size: 0.9375rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      outline: none;
    }

    .input-premium::placeholder {
      color: #475569;
      font-weight: 400;
    }

    .input-premium:hover {
      border-color: rgba(148, 163, 184, 0.2);
      background: rgba(30, 41, 59, 0.7);
    }

    .input-premium:focus {
      border-color: rgba(59, 130, 246, 0.5);
      background: rgba(30, 41, 59, 0.8);
      box-shadow: 
        0 0 0 3px rgba(59, 130, 246, 0.1),
        0 0 20px rgba(59, 130, 246, 0.08);
    }

    .input-group {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      transition: color 0.3s ease;
      pointer-events: none;
    }

    .input-group:focus-within .input-icon {
      color: #60a5fa;
    }

    /* Toggle password visibility */
    .input-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      transition: all 0.2s ease;
      background: transparent;
      border: none;
    }

    .input-toggle:hover {
      color: #94a3b8;
      background: rgba(148, 163, 184, 0.1);
    }

    /* Premium button */
    .btn-premium {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      border-radius: var(--radius-md);
      border: none;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-primary-glow {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: white;
      box-shadow: 
        0 4px 16px rgba(37, 99, 235, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }

    .btn-primary-glow:hover {
      transform: translateY(-1px);
      box-shadow: 
        0 8px 24px rgba(37, 99, 235, 0.45),
        0 0 0 1px rgba(255, 255, 255, 0.15) inset,
        0 0 40px rgba(37, 99, 235, 0.2);
    }

    .btn-primary-glow:active {
      transform: translateY(0);
    }

    .btn-primary-glow::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.12) 50%, transparent 100%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .btn-primary-glow:hover::after {
      transform: translateX(100%);
    }

    .btn-secondary-glass {
      background: rgba(148, 163, 184, 0.08);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.15);
    }

    .btn-secondary-glass:hover {
      background: rgba(148, 163, 184, 0.12);
      border-color: rgba(148, 163, 184, 0.25);
      color: #e2e8f0;
    }

    /* Divider with text */
    .divider-premium {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #475569;
      font-size: 0.8125rem;
    }

    .divider-premium::before,
    .divider-premium::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(148, 163, 184, 0.2), transparent);
    }

    /* Social login buttons */
    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      background: rgba(30, 41, 59, 0.5);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: var(--radius-md);
      color: #94a3b8;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .social-btn:hover {
      background: rgba(30, 41, 59, 0.7);
      border-color: rgba(148, 163, 184, 0.2);
      color: #e2e8f0;
      transform: translateY(-1px);
    }

    /* Link styling */
    .link-premium {
      color: #60a5fa;
      font-weight: 500;
      text-decoration: none;
      position: relative;
      transition: color 0.2s ease;
    }

    .link-premium::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1.5px;
      background: linear-gradient(90deg, #60a5fa, #8b5cf6);
      transition: width 0.3s ease;
      border-radius: 1px;
    }

    .link-premium:hover {
      color: #93c5fd;
    }

    .link-premium:hover::after {
      width: 100%;
    }

    /* Checkbox premium */
    .checkbox-premium {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(148, 163, 184, 0.3);
      border-radius: 5px;
      background: rgba(30, 41, 59, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      flex-shrink: 0;
    }

    .checkbox-premium:checked {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      border-color: transparent;
    }

    .checkbox-premium:checked::after {
      content: '';
      position: absolute;
      left: 5px;
      top: 2px;
      width: 5px;
      height: 9px;
      border: solid white;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .checkbox-premium:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px;
      border-radius: var(--radius-md);
      backdrop-filter: blur(16px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: slideDown 0.4s ease-out;
      max-width: 400px;
    }

    .toast-success {
      background: rgba(22, 163, 74, 0.15);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #4ade80;
    }

    .toast-error {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
    }

    .toast-info {
      background: rgba(37, 99, 235, 0.15);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: #60a5fa;
    }

    /* Loading spinner */
    .spinner {
      width: 20px;
      height: 20px;
      border: 2.5px solid rgba(255, 255, 255, 0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Security badge */
    .security-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.15);
      border-radius: 9999px;
      color: #4ade80;
      font-size: 0.75rem;
      font-weight: 600;
    }

    /* Animated rings behind logo */
    .ring-container {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(59, 130, 246, 0.15);
    }

    .ring-1 {
      width: 120px;
      height: 120px;
      animation: spin 20s linear infinite;
    }

    .ring-2 {
      width: 160px;
      height: 160px;
      border-color: rgba(139, 92, 246, 0.1);
      animation: spin 30s linear infinite reverse;
    }

    .ring-3 {
      width: 200px;
      height: 200px;
      border-color: rgba(59, 130, 246, 0.08);
      border-style: dashed;
      animation: spin 40s linear infinite;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: rgba(59, 130, 246, 0.3);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .auth-card {
        border-radius: var(--radius-lg);
        margin: 0 8px;
      }

      .orb {
        display: none;
      }
    }

    /* Print styles */
    @media print {
      .bg-mesh, .grid-pattern, .noise, .orb, .particle, .ring-container {
        display: none !important;
      }

      body {
        background: white !important;
        color: black !important;
      }
    }

    /* Focus visible for accessibility */
    *:focus-visible {
      outline: 2px solid rgba(59, 130, 246, 0.5);
      outline-offset: 2px;
    }
  </style>

  {% block extra_head %}{% endblock %}
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative">
  <!-- Background Layers -->
  <div class="bg-mesh"></div>
  <div class="grid-pattern"></div>
  <div class="noise"></div>

  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Floating Particles (JS generated) -->
  <div id="particles"></div>

  <!-- Main Content -->
  <div class="w-full relative z-10 animate-fade-in" style="max-width:{% block card_width %}420px{% endblock %}">

    <!-- Logo Section -->
    <div class="text-center mb-8 animate-slide-down">
      <div class="ring-container mb-6">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="ring ring-3"></div>
        <div class="logo-container">
          <i data-lucide="bar-chart-3" class="w-7 h-7 text-white"></i>
        </div>
      </div>

      <h1 class="text-2xl font-bold text-white mb-2 tracking-tight">
        JSE Analytics
      </h1>
      <p class="text-sm text-slate-500 font-medium tracking-wide uppercase">
        Bluemachines Platform
      </p>
    </div>

    <!-- Auth Card -->
    <div class="auth-card animate-scale-in">
      <div class="p-8 relative z-10">
        {% block content %}{% endblock %}
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-8 text-center animate-fade-in" style="animation-delay: 0.3s;">
      <div class="flex items-center justify-center gap-2 mb-3">
        <div class="security-badge">
          <i data-lucide="shield-check" class="w-3.5 h-3.5"></i>
          <span>256-bit SSL Secured</span>
        </div>
      </div>
      <p class="text-xs text-slate-600">
        &copy; <span id="year"></span> JSE Analytics Platform. All rights reserved.
      </p>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/utils.js"></script>
  <script src="/js/auth-ui.js"></script>

  {% block extra_js %}{% endblock %}
  {% block scripts %}{% endblock %}
</body>
</html>
