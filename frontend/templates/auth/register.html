{% extends "auth_base.html" %}
{% block title %}Register - JSE Analytics{% endblock %}
{% block card_width %}520px{% endblock %}
{% block content %}
<h2 class="text-xl font-semibold text-white text-center mb-1">Create account</h2>
<p class="text-sm text-slate-500 text-center mb-6">Choose your registration type</p>

<div class="flex gap-2 mb-6">
  <button type="button" class="btn-premium btn-primary-glow tab-btn flex-1 py-3" data-tab="admin">Admin</button>
  <button type="button" class="btn-premium btn-secondary-glass tab-btn flex-1 py-3" data-tab="company">Company</button>
  <button type="button" class="btn-premium btn-secondary-glass tab-btn flex-1 py-3" data-tab="employee">Employee</button>
</div>

<form id="form-admin" class="tab-form space-y-4">
  <div class="input-group">
    <i data-lucide="mail" class="input-icon w-4 h-4"></i>
    <input type="email" name="email" class="input-premium" placeholder="Email" required>
  </div>
  <div class="input-group">
    <i data-lucide="lock" class="input-icon w-4 h-4"></i>
    <input type="password" name="password" class="input-premium" placeholder="Password (min 8 chars)" required minlength="8">
  </div>
  <input type="text" name="name" class="input-premium !pl-4" placeholder="Name" required>
  <input type="text" name="surname" class="input-premium !pl-4" placeholder="Surname" required>
  <input type="text" name="phone_number" class="input-premium !pl-4" placeholder="Phone Number">
  <select name="gender" class="input-premium !pl-4">
    <option value="">Gender (optional)</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
    <option value="other">Other</option>
  </select>
  <button type="submit" class="btn-premium btn-primary-glow">Register as Admin</button>
</form>

<form id="form-company" class="tab-form space-y-4 hidden">
  <input type="text" name="company_name" class="input-premium !pl-4" placeholder="Company Name" required>
  <input type="text" name="registration_number" class="input-premium !pl-4" placeholder="Registration Number" required>
  <input type="url" name="website" class="input-premium !pl-4" placeholder="Website URL">
  <input type="text" name="industry" class="input-premium !pl-4" placeholder="Industry">
  <div class="divider-premium my-2">Admin details</div>
  <div class="input-group">
    <i data-lucide="mail" class="input-icon w-4 h-4"></i>
    <input type="email" name="admin_email" class="input-premium" placeholder="Admin Email" required>
  </div>
  <div class="input-group">
    <i data-lucide="lock" class="input-icon w-4 h-4"></i>
    <input type="password" name="admin_password" class="input-premium" placeholder="Admin Password" required minlength="8">
  </div>
  <input type="text" name="admin_name" class="input-premium !pl-4" placeholder="Admin Name" required>
  <input type="text" name="admin_surname" class="input-premium !pl-4" placeholder="Admin Surname" required>
  <button type="submit" class="btn-premium btn-primary-glow">Register Company</button>
</form>

<form id="form-employee" class="tab-form space-y-4 hidden">
  <div class="input-group">
    <i data-lucide="mail" class="input-icon w-4 h-4"></i>
    <input type="email" name="email" class="input-premium" placeholder="Email" required>
  </div>
  <div class="input-group">
    <i data-lucide="lock" class="input-icon w-4 h-4"></i>
    <input type="password" name="password" class="input-premium" placeholder="Password" required minlength="8">
  </div>
  <input type="text" name="name" class="input-premium !pl-4" placeholder="Name" required>
  <input type="text" name="surname" class="input-premium !pl-4" placeholder="Surname" required>
  <input type="number" name="company_id" class="input-premium !pl-4" placeholder="Company ID" required>
  <button type="submit" class="btn-premium btn-primary-glow">Register as Employee</button>
</form>

<p class="text-center text-sm text-slate-500 mt-6"><a href="/auth/login.html" class="link-premium">Back to login</a></p>
{% endblock %}
{% block scripts %}
<script>
  const tabs = document.querySelectorAll('.tab-btn');
  const forms = document.querySelectorAll('.tab-form');
  tabs.forEach(btn => btn.addEventListener('click', () => {
    tabs.forEach(b => {
      b.className = 'btn-premium btn-secondary-glass tab-btn flex-1 py-3';
    });
    btn.className = 'btn-premium btn-primary-glow tab-btn flex-1 py-3';
    forms.forEach(f => f.classList.add('hidden'));
    document.getElementById('form-' + btn.dataset.tab).classList.remove('hidden');
    if (typeof lucide !== 'undefined') lucide.createIcons();
  }));

  async function handleRegister(e, endpoint) {
    e.preventDefault();
    const form = e.target;
    if (!AuthUI.validateForm(form)) return;
    const submitBtn = form.querySelector('button[type="submit"]');
    AuthUI.setButtonLoading(submitBtn, true);
    const body = Object.fromEntries(new FormData(form).entries());
    try {
      const data = await API.post(endpoint, body);
      sessionStorage.setItem('registration_id', data.registration_id);
      AuthUI.showToast(data.message, 'success');
      setTimeout(() => location.href = '/auth/confirm-account.html', 1500);
    } catch (err) {
      AuthUI.showToast(err.message, 'error');
    } finally {
      AuthUI.setButtonLoading(submitBtn, false);
    }
  }

  document.getElementById('form-admin').addEventListener('submit', e => handleRegister(e, '/auth/register/admin'));
  document.getElementById('form-company').addEventListener('submit', e => handleRegister(e, '/auth/register/company'));
  document.getElementById('form-employee').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!AuthUI.validateForm(form)) return;
    const submitBtn = form.querySelector('button[type="submit"]');
    AuthUI.setButtonLoading(submitBtn, true);
    const body = Object.fromEntries(new FormData(form).entries());
    body.company_id = parseInt(body.company_id, 10);
    try {
      const data = await API.post('/auth/register/employee', body);
      AuthUI.showToast(data.message + ' Check your email for verification.', 'success');
    } catch (err) {
      AuthUI.showToast(err.message, 'error');
    } finally {
      AuthUI.setButtonLoading(submitBtn, false);
    }
  });
</script>
{% endblock %}
