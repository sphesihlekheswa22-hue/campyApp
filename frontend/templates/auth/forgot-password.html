{% extends "auth_base.html" %}
{% block title %}Forgot Password - JSE Analytics{% endblock %}
{% block content %}
<h2 class="text-xl font-semibold text-white text-center mb-1">Password recovery</h2>
<p class="text-sm text-slate-500 text-center mb-6">We'll send a reset token to your email</p>

<form id="forgot-form" class="space-y-5">
  <div>
    <label class="block text-sm font-medium text-slate-400 mb-2">Email</label>
    <div class="input-group">
      <i data-lucide="mail" class="input-icon w-4 h-4"></i>
      <input type="email" name="email" class="input-premium" placeholder="you@company.com" required>
    </div>
  </div>
  <button type="submit" id="forgot-btn" class="btn-premium btn-primary-glow">
    <i data-lucide="send" class="w-4 h-4"></i>
    <span>Send Reset Token</span>
  </button>
</form>

<form id="reset-form" class="space-y-5 mt-6 hidden">
  <div class="divider-premium">Enter reset token</div>
  <div class="input-group">
    <i data-lucide="key-round" class="input-icon w-4 h-4"></i>
    <input type="text" name="token" class="input-premium" placeholder="Reset Token" required>
  </div>
  <div class="input-group">
    <i data-lucide="lock" class="input-icon w-4 h-4"></i>
    <input type="password" id="new-password" name="new_password" class="input-premium" placeholder="New Password" required minlength="8" style="padding-right: 44px;">
    <button type="button" class="input-toggle" onclick="togglePassword('new-password', this)" aria-label="Toggle password">
      <i data-lucide="eye" class="w-4 h-4"></i>
    </button>
  </div>
  <button type="submit" id="reset-btn" class="btn-premium btn-primary-glow">
    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
    <span>Reset Password</span>
  </button>
</form>

<p class="text-center text-sm text-slate-500 mt-6"><a href="/auth/login.html" class="link-premium">Back to login</a></p>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('forgot-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!AuthUI.validateForm(form)) return;
    const btn = document.getElementById('forgot-btn');
    AuthUI.setButtonLoading(btn, true);
    const email = new FormData(form).get('email');
    try {
      await API.post('/auth/forgot-password', { email });
      AuthUI.showToast('If email exists, reset token sent. Check MailHog in dev.', 'success');
      document.getElementById('reset-form').classList.remove('hidden');
    } catch (err) {
      AuthUI.showToast(err.message, 'error');
    } finally {
      AuthUI.setButtonLoading(btn, false);
    }
  });

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!AuthUI.validateForm(form)) return;
    const btn = document.getElementById('reset-btn');
    AuthUI.setButtonLoading(btn, true);
    const fd = new FormData(form);
    try {
      await API.post('/auth/reset-password', {
        token: fd.get('token'),
        new_password: fd.get('new_password'),
      });
      AuthUI.showToast('Password reset! Redirecting…', 'success');
      setTimeout(() => location.href = '/auth/login.html', 2000);
    } catch (err) {
      AuthUI.showToast(err.message, 'error');
    } finally {
      AuthUI.setButtonLoading(btn, false);
    }
  });
</script>
{% endblock %}
