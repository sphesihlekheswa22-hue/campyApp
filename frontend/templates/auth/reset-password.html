{% extends "auth_base.html" %}
{% block title %}Reset Password - JSE Analytics{% endblock %}
{% block content %}
<h2 class="text-xl font-semibold text-white text-center mb-1">Reset your password</h2>
<p class="text-sm text-slate-500 text-center mb-6">Choose a new password for your account</p>

<form id="reset-form" class="space-y-5">
  <input type="hidden" name="token" id="reset-token">
  <div class="input-group">
    <i data-lucide="lock" class="input-icon w-4 h-4"></i>
    <input type="password" id="new-password" name="new_password" class="input-premium" placeholder="New password" required minlength="8" style="padding-right: 44px;">
    <button type="button" class="input-toggle" onclick="togglePassword('new-password', this)" aria-label="Toggle password">
      <i data-lucide="eye" class="w-4 h-4"></i>
    </button>
  </div>
  <div class="input-group">
    <i data-lucide="lock" class="input-icon w-4 h-4"></i>
    <input type="password" id="confirm-password" name="confirm_password" class="input-premium" placeholder="Confirm password" required minlength="8" style="padding-right: 44px;">
    <button type="button" class="input-toggle" onclick="togglePassword('confirm-password', this)" aria-label="Toggle password">
      <i data-lucide="eye" class="w-4 h-4"></i>
    </button>
  </div>
  <button type="submit" id="reset-btn" class="btn-premium btn-primary-glow w-full">
    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
    <span>Reset Password</span>
  </button>
</form>

<p class="text-center text-sm text-slate-500 mt-6">
  <a href="/auth/login.html" class="link-premium">Back to login</a>
</p>
{% endblock %}
{% block scripts %}
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    AuthUI.showToast('Invalid or missing reset link. Request a new token.', 'error');
    setTimeout(() => { window.location.href = '/auth/forgot-password.html'; }, 2000);
  } else {
    document.getElementById('reset-token').value = token;
  }

  document.getElementById('reset-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!AuthUI.validateForm(form)) return;
    const fd = new FormData(form);
    if (fd.get('new_password') !== fd.get('confirm_password')) {
      AuthUI.showToast('Passwords do not match', 'error');
      return;
    }
    const btn = document.getElementById('reset-btn');
    AuthUI.setButtonLoading(btn, true);
    try {
      await API.post('/auth/reset-password', {
        token: fd.get('token'),
        new_password: fd.get('new_password'),
      });
      AuthUI.showToast('Password reset! Redirecting to login…', 'success');
      setTimeout(() => { window.location.href = '/auth/login.html'; }, 2000);
    } catch (err) {
      AuthUI.showToast(err.message || 'Reset failed', 'error');
    } finally {
      AuthUI.setButtonLoading(btn, false);
    }
  });
</script>
{% endblock %}
