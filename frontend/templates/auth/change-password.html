{% extends "auth_base.html" %}
{% block title %}Change Password - JSE Analytics{% endblock %}
{% block content %}
<div class="text-center mb-8">
  <h2 class="text-2xl font-bold text-white mb-2">Set New Password</h2>
  <p class="text-sm text-slate-500">You must change your temporary password before continuing</p>
</div>

<form id="change-form" class="space-y-5">
  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-400">Current password</label>
    <input type="password" name="current" class="input-premium" required autocomplete="current-password">
  </div>
  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-400">New password</label>
    <input type="password" name="new" class="input-premium" required minlength="8" autocomplete="new-password">
  </div>
  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-400">Confirm new password</label>
    <input type="password" name="confirm" class="input-premium" required minlength="8" autocomplete="new-password">
  </div>
  <button type="submit" class="btn-premium btn-primary-glow w-full" id="change-btn">
    <span>Update Password</span>
  </button>
</form>
{% endblock %}
{% block scripts %}
<script>
  if (!Auth.isLoggedIn()) window.location.href = '/auth/login.html';

  document.getElementById('change-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const current = fd.get('current');
    const newPw = fd.get('new');
    const confirm = fd.get('confirm');
    if (newPw !== confirm) {
      AuthUI.showToast('Passwords do not match', 'error');
      return;
    }
    const btn = document.getElementById('change-btn');
    AuthUI.setButtonLoading(btn, true);
    try {
      await API.post('/auth/change-password', { current_password: current, new_password: newPw });
      AuthUI.showToast('Password updated', 'success');
      setTimeout(() => Auth.redirectByRole(), 600);
    } catch (err) {
      AuthUI.showToast(err.message || 'Failed to change password', 'error');
      AuthUI.setButtonLoading(btn, false);
    }
  });
</script>
{% endblock %}
