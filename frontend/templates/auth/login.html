{% extends "auth_base.html" %}
{% block title %}Sign In - JSE Analytics{% endblock %}
{% block content %}
<div class="text-center mb-8">
  <h2 class="text-2xl font-bold text-white mb-2">Welcome Back</h2>
  <p class="text-sm text-slate-500">Sign in to access your analytics dashboard</p>
</div>

<div id="alert" class="mb-4"></div>

<form id="login-form" class="space-y-5">
  <div class="space-y-2">
    <label class="block text-sm font-medium text-slate-400">Email Address</label>
    <div class="input-group">
      <i data-lucide="mail" class="input-icon w-5 h-5"></i>
      <input type="email" name="email" id="login-email" class="input-premium" placeholder="you@company.com" required autocomplete="email">
    </div>
  </div>

  <div class="space-y-2">
    <div class="flex items-center justify-between">
      <label class="block text-sm font-medium text-slate-400">Password</label>
      <a href="/auth/forgot-password.html" class="link-premium text-xs">Forgot password?</a>
    </div>
    <div class="input-group">
      <i data-lucide="lock" class="input-icon w-5 h-5"></i>
      <input type="password" name="password" id="login-password" class="input-premium" placeholder="Enter your password" required autocomplete="current-password" style="padding-right: 44px;">
      <button type="button" class="input-toggle" onclick="togglePassword('login-password', this)" aria-label="Toggle password">
        <i data-lucide="eye" class="w-4 h-4"></i>
      </button>
    </div>
  </div>

  <button type="submit" class="btn-premium btn-primary-glow mt-2" id="login-btn">
    <i data-lucide="log-in" class="w-5 h-5"></i>
    <span>Sign In</span>
  </button>
</form>

<div class="divider-premium my-6">
  <span>or continue with</span>
</div>

<div class="grid grid-cols-2 gap-3">
  <button type="button" class="social-btn" onclick="AuthToast.show('Google OAuth coming soon', 'info')">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    <span>Google</span>
  </button>
  <button type="button" class="social-btn" onclick="AuthToast.show('Microsoft OAuth coming soon', 'info')">
    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M11 11H0V0h11v11zm13 0H13V0h11v11zM11 24H0V13h11v11zm13 0H13V13h11v11z"/>
    </svg>
    <span>Microsoft</span>
  </button>
</div>

<p class="text-center text-sm text-slate-500 mt-6">
  Need an account? Contact your administrator.
</p>
{% endblock %}
{% block scripts %}
<script>
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const btn = document.getElementById('login-btn');

    if (!AuthUI.validateForm(form)) {
      AuthUI.showToast('Please fill in all required fields', 'error');
      return;
    }

    AuthUI.setButtonLoading(btn, true);
    const fd = new FormData(form);

    try {
      const data = await API.post('/auth/login', {
        email: fd.get('email'),
        password: fd.get('password'),
      });
      Auth.login(data);
      if (data.must_change_password) {
        AuthUI.showToast('Please set a new password', 'info');
        setTimeout(() => { window.location.href = '/auth/change-password.html'; }, 400);
        return;
      }
      AuthUI.showToast('Login successful! Redirecting...', 'success');
      setTimeout(() => Auth.redirectByRole(), 500);
    } catch (err) {
      AuthUI.showToast(err.message || 'Login failed', 'error');
      AuthUI.setButtonLoading(btn, false);
    }
  });
</script>
{% endblock %}
